version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 18
    commands:
      - echo "Installing dependencies..."
      - npm ci --legacy-peer-deps

  pre_build:
    commands:
      - echo "Pre-build..."

  build:
    commands:
      - echo "Building the app..."
      - npm run build

  post_build:
    commands:
      - echo "Post-build..."

artifacts:
  files:
    - '**/*'
  base-directory: dist
  discard-paths: no