<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Beyond Calories — Gates Hadisubroto</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        html, body { margin: 0; padding: 0; min-height: 100vh; background: #000; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: white;
        }
        video.bg {
            position: fixed; inset: 0; width: 100%; height: 100%;
            object-fit: cover; z-index: -2;
        }
        .overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.55); z-index: -1;
        }
        iframe { background: white; }
    </style>
</head>
<body>
<!-- Background video to match home page -->
<video class="bg" autoplay loop muted playsinline>
    <source src="/image/wallpaper.mp4" type="video/mp4" />
</video>
<div class="overlay"></div>

<div class="min-h-screen w-full px-6 py-8 flex flex-col">
    <!-- Header bar -->
    <header class="flex items-center justify-between mb-6 max-w-[1400px] w-full mx-auto">
        <a href="/" class="text-2xl font-bold tracking-wider text-white hover:text-orange-400 transition">
            GATES
        </a>
        <a
                href="/"
                class="inline-block py-3 px-6 bg-orange-400 rounded-full text-sm font-bold
               uppercase tracking-widest text-black hover:scale-90 active:scale-95 transition duration-150"
        >
            ← Back
        </a>
    </header>

    <!-- Glass panel containing the PDF -->
    <main class="flex-1 max-w-[1400px] w-full mx-auto">
        <section
                class="rounded-2xl bg-white/5 backdrop-blur-md border border-white/10
               p-6 md:p-8 shadow-lg flex flex-col h-[calc(100vh-180px)]"
        >
            <div class="mb-4">
                <p class="text-xs font-bold uppercase tracking-widest text-orange-300 mb-2">
                    Project 5 — In Progress
                </p>
                <h1 class="text-2xl md:text-3xl font-black uppercase leading-tight tracking-wider text-white">
                    Beyond Calories
                </h1>
                <p class="text-sm md:text-base text-white/70 mt-2">
                    Predicting Self-Reported Wellbeing from Eating and Lifestyle Patterns
                </p>

                <div class="flex flex-wrap gap-2 mt-4">
                    <span class="text-xs bg-orange-400/20 text-orange-200 px-3 py-1 rounded-full">Deep Learning</span>
                    <span class="text-xs bg-orange-400/20 text-orange-200 px-3 py-1 rounded-full">Transformers</span>
                    <span class="text-xs bg-orange-400/20 text-orange-200 px-3 py-1 rounded-full">Auto-Encoders</span>
                    <span class="text-xs bg-orange-400/20 text-orange-200 px-3 py-1 rounded-full">TensorFlow</span>
                    <span class="text-xs bg-orange-400/20 text-orange-200 px-3 py-1 rounded-full">Keras</span>
                </div>
            </div>

            <!-- PDF embed -->
            <div class="flex-1 rounded-xl overflow-hidden border border-white/20 bg-black/40">
                <iframe
                        src="/pdfs/beyond-calories-deepLearningNN.pdf"
                        class="w-full h-full"
                        title="Beyond Calories project paper"
                ></iframe>
            </div>

            <!-- Fallback link -->
            <div class="mt-4 text-center">
                <a
                        href="/pdfs/beyond-calories-deepLearningNN.pdf"
                        target="_blank"
                        rel="noopener noreferrer"
                        class="text-sm text-orange-300 hover:underline"
                >
                    Can't see the PDF? Open in a new tab →
                </a>
            </div>
        </section>
    </main>
</div>
</body>
</html>
